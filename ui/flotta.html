<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARGO · Console della flotta</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='256' height='256' rx='58' fill='url(%23g)'/%3E%3C/svg%3E">
<style>
/* ============================================================
   ARGO — Console centrale della flotta (file singolo)
   Stesso sistema di design di index.html: navy profondo, accenti
   indaco→violetto, scala tipografica e ritmo coerenti. Nessuna
   dipendenza esterna.
   ============================================================ */
:root {
  --bg:    #080c14;       /* identico a index.html */
  --bg2:   #0e1525;
  --card:  #111827;
  --card2: #141e31;
  --bd:    #1e2d45;
  --bd2:   #263550;
  --tx:    #e8edf5;       /* corpo testo: >7:1 sul card */
  --tx2:   #aab6c9;       /* secondario: ~6.6:1 sul bg */
  --mut:   #8492a8;       /* attenuato ma leggibile: ~4.6:1 */
  --acc1:  #6366f1;
  --acc2:  #8b5cf6;
  --acc-tx:#a5b4fc;       /* accento su scuro, alto contrasto */
  --ok:    #22c55e;
  --err:   #f87171;
  --off:   #6b7689;
  --glow:  rgba(99,102,241,.18);
  --focus: #a5b4fc;
  --rad:   14px;
  --trans: .18s cubic-bezier(.22,1,.36,1);   /* ease-out-quint */
  --ease:  cubic-bezier(.22,1,.36,1);
}

*, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(139,92,246,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 0%, rgba(99,102,241,.12), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  color: var(--tx);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  letter-spacing: .005em;   /* compensa testo chiaro su fondo scuro */
  font-kerning: normal;
}
h1, h2, .titoli p { text-wrap: balance; }

/* ---------- Scrollbar custom (come index.html) ---------- */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: #3a4f70; }

/* ---------- Focus visibile (a11y) ---------- */
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: 6px;
}
:focus:not(:focus-visible) { outline: none; }

/* ---------- Reduced motion (a11y) ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
}

.wrap {
  max-width: 1040px;
  margin: 0 auto;
  padding: 28px 20px 56px;
}

/* Ingresso discreto: il contenuto è già visibile, l'animazione
   lo rifinisce soltanto (mai gate sulla visibilità). */
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
.enter { animation: rise .5s var(--ease) both; }
.enter.d1 { animation-delay: .05s; }
.enter.d2 { animation-delay: .12s; }
.enter.d3 { animation-delay: .19s; }

/* ---------- Header (allineato a index.html) ---------- */
header.top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.logo {
  width: 38px; height: 38px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--acc1), var(--acc2));
  flex: 0 0 auto;
  box-shadow: 0 0 0 1px rgba(99,102,241,.25), 0 4px 14px rgba(0,0,0,.4);
}
.titoli h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: .3px;
  line-height: 1.25;
}
.titoli p {
  margin: 3px 0 0;
  color: var(--tx2);
  font-size: 12.5px;
}
.aggiorna {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--tx2);
  font-size: 11.5px;
  border: 1px solid var(--bd);
  background: var(--card);
  border-radius: 999px;
  padding: 5px 11px;
  white-space: nowrap;
  transition: var(--trans);
}
.live {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 3px rgba(34,197,94,.18);   /* alone discreto = vivo */
  animation: pulse-dot 1.6s ease infinite;
  flex: 0 0 auto;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; } 50% { opacity: .4; }
}
.live.spenta {
  background: var(--off);
  box-shadow: 0 0 0 3px rgba(107,118,137,.16);
  animation: none;
}

/* ---------- Schede metriche ---------- */
.metriche {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 30px;
}
.metrica {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: var(--rad);
  padding: 15px 16px;
  transition: border-color var(--trans);
}
.metrica:hover { border-color: var(--bd2); }
.metrica .etich {
  color: var(--mut);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
}
.metrica .val {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
  margin-top: 8px;
  color: var(--tx);
  font-variant-numeric: tabular-nums;
}
.metrica .sotto { color: var(--tx2); font-size: 12px; margin-top: 4px; }

/* ---------- Lista istanze ---------- */
.section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--mut);
  margin: 0 0 10px;
}
.griglia {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.istanza {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: var(--rad);
  padding: 15px 16px;
  transition: border-color var(--trans);
}
.istanza:hover { border-color: var(--bd2); }
.istanza .riga1 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 7px;
}
.istanza .nome {
  font-weight: 600;
  font-size: 14px;
  color: var(--tx);
}
.badge {
  margin-left: auto;
  font-size: 10.5px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.badge::before {
  content: "";
  width: 5px; height: 5px; border-radius: 50%;
  background: currentColor;
}
.badge.on  { color: #4ade80; background: rgba(34,197,94,.12);  border-color: rgba(34,197,94,.25); }
.badge.on::before { animation: pulse-dot 1.6s ease infinite; }
.badge.off { color: #c4cdda; background: rgba(107,118,137,.14); border-color: rgba(107,118,137,.3); }
.istanza .base {
  color: var(--acc-tx);
  font-size: 12px;
  word-break: break-all;
}
.istanza .meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 11px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,.04);
  color: var(--tx2);
  font-size: 12px;
}
.istanza .meta b { color: var(--tx); font-weight: 600; font-variant-numeric: tabular-nums; }
.istanza.errore { border-color: rgba(248,113,113,.3); }
.istanza .err { color: #fca5a5; font-size: 11.5px; margin-top: 8px; }

.vuoto, .stato-msg {
  grid-column: 1 / -1;
  color: var(--mut);
  text-align: center;
  padding: 34px 16px;
  font-size: 13px;
  border: 1px dashed var(--bd);
  border-radius: var(--rad);
  background: rgba(17,24,39,.4);
}

footer.pie {
  margin-top: 34px;
  text-align: center;
  color: var(--mut);
  font-size: 11.5px;
}
footer.pie a { color: var(--acc-tx); text-decoration: none; transition: var(--trans); }
footer.pie a:hover { text-decoration: underline; }

@media (max-width: 520px) {
  .wrap { padding: 22px 16px 48px; }
  .metriche { gap: 10px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="top enter">
    <div class="logo" aria-hidden="true"></div>
    <div class="titoli">
      <h1>Console della flotta</h1>
      <p>Stato in tempo reale delle istanze ARGO</p>
    </div>
    <div class="aggiorna" role="status" aria-live="polite">
      <span id="live" class="live spenta" aria-hidden="true"></span>
      <span id="agg">In attesa del primo aggiornamento…</span>
    </div>
  </header>

  <div class="metriche enter d1" id="metriche" aria-live="polite">
    <div class="metrica">
      <div class="etich">Istanze</div>
      <div class="val" id="m-totale">·</div>
      <div class="sotto"><span id="m-online">0</span> online ora</div>
    </div>
    <div class="metrica">
      <div class="etich">Ricordi</div>
      <div class="val" id="m-ricordi">·</div>
      <div class="sotto">aggregati sulla flotta</div>
    </div>
    <div class="metrica">
      <div class="etich">Azioni</div>
      <div class="val" id="m-azioni">·</div>
      <div class="sotto">eseguite in totale</div>
    </div>
    <div class="metrica">
      <div class="etich">Versioni</div>
      <div class="val" id="m-versioni">·</div>
      <div class="sotto">in circolazione</div>
    </div>
  </div>

  <section class="istanze enter d2">
    <h2 class="section-title">Istanze</h2>
    <div class="griglia" id="griglia" aria-live="polite" aria-busy="true">
      <div class="stato-msg">Carico la flotta…</div>
    </div>
  </section>

  <footer class="pie enter d3">
    ARGO · <a href="/">Torna all'interfaccia</a>
  </footer>

</div>

<script>
// ------------------------------------------------------------------
// Console flotta: polling di /flotta ogni ~5s. Degrada con grazia
// se l'endpoint non risponde, senza mai bloccare la pagina.
// ------------------------------------------------------------------
const $ = (id) => document.getElementById(id);

function num(v) {
  const n = Number(v || 0);
  return Number.isFinite(n) ? n.toLocaleString("it-IT") : "0";
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function ora() {
  const d = new Date();
  return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function cardIstanza(i) {
  const online = !!i._online;
  const nome = esc(i.nome || i.id || "ARGO");
  const base = esc(i._base || "");
  const ver = esc(i.versione || "?");
  const div = document.createElement("div");
  div.className = "istanza" + (i.errore ? " errore" : "");
  let meta = "";
  if (online) {
    meta = '<div class="meta">' +
           '<span><b>' + num(i.ricordi) + '</b> ricordi</span>' +
           '<span><b>' + num(i.azioni) + '</b> azioni</span>' +
           '<span>v' + ver + '</span>' +
           '</div>';
  } else if (i.errore) {
    meta = '<div class="err">' + esc(i.errore) + '</div>';
  }
  div.innerHTML =
    '<div class="riga1">' +
      '<span class="nome">' + nome + '</span>' +
      '<span class="badge ' + (online ? "on" : "off") + '">' +
        (online ? "online" : "offline") + '</span>' +
    '</div>' +
    '<div class="base">' + base + '</div>' +
    meta;
  return div;
}

function rendi(d) {
  $("m-totale").textContent  = num(d.totale);
  $("m-online").textContent  = num(d.online);
  $("m-ricordi").textContent = num(d.ricordi_totali);
  $("m-azioni").textContent  = num(d.azioni_totali);
  const versioni = Array.isArray(d.versioni) ? d.versioni.filter(Boolean) : [];
  $("m-versioni").textContent = versioni.length ? versioni.length : "—";

  const griglia = $("griglia");
  griglia.innerHTML = "";
  griglia.setAttribute("aria-busy", "false");
  const lista = Array.isArray(d.istanze) ? d.istanze : [];
  if (!lista.length) {
    const v = document.createElement("div");
    v.className = "vuoto";
    v.textContent = d.errore
      ? ("Flotta non disponibile: " + d.errore)
      : "Nessuna istanza registrata. Le istanze ARGO appariranno qui appena si collegano.";
    griglia.appendChild(v);
    return;
  }
  // Online prima, poi offline; ognuna ordinata per nome.
  lista.sort((a, b) => (b._online ? 1 : 0) - (a._online ? 1 : 0) ||
                       String(a.nome || "").localeCompare(String(b.nome || "")));
  for (const i of lista) griglia.appendChild(cardIstanza(i));
}

async function tick() {
  try {
    const r = await fetch("/flotta", { cache: "no-store" });
    const d = await r.json();
    rendi(d);
    $("live").classList.remove("spenta");
    $("agg").textContent = "Aggiornato alle " + ora();
  } catch (e) {
    // Degrada con grazia: segnala lo stato senza svuotare la vista.
    $("live").classList.add("spenta");
    $("agg").textContent = "Non raggiungibile, riprovo…";
  }
}

tick();
setInterval(tick, 5000);
</script>
</body>
</html>
